services:
  docscanai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - docscanai-data:/app/data
      - docscanai-models:/home/docscanai/.cache
    environment:
      - DOCSCAN_DATA_DIR=/app/data
      - DOCSCAN_OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Sidecar container to pull models after Ollama is healthy
  model-loader:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"glm-ocr\"}' &&
             curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen3.5:9b\"}'"
    restart: "no"

volumes:
  docscanai-data:
  docscanai-models:
  ollama-models: